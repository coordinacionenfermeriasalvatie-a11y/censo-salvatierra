<!doctype html>
<html lang="es-MX">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reiniciando Censo Salvatierra…</title>
  <style>
    body { font-family: -apple-system, Arial, sans-serif; background: #F5F1E8; color: #265C4E;
      min-height: 100vh; display: flex; flex-direction: column; align-items: center;
      justify-content: center; padding: 24px; text-align: center; }
    h1 { color: #0E6755; margin: 0 0 12px; }
    p { max-width: 480px; line-height: 1.5; }
    code { background: #fff; padding: 2px 6px; border-radius: 4px; border: 1px solid #C39C59; }
    button { background: #0E6755; color: #fff; border: none; padding: 12px 24px;
      border-radius: 6px; font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 16px; }
    #estado { font-family: monospace; background: #fff; padding: 12px; border-radius: 4px;
      border: 1px solid #C39C59; margin-top: 16px; white-space: pre-line; max-width: 600px;
      text-align: left; }
  </style>
</head>
<body>
  <h1>🔧 Reiniciando Censo Salvatierra</h1>
  <p>Limpiando caché del Service Worker y de la app. Esto soluciona pantallas
     en blanco después de un deploy.</p>
  <div id="estado">Iniciando…</div>
  <button id="ir" style="display:none" onclick="location.href='/'">Abrir la app</button>

  <script>
  (async function() {
    const log = (msg) => {
      document.getElementById('estado').textContent += '\n' + msg;
    };

    try {
      // 1) Desregistrar todos los service workers
      if ('serviceWorker' in navigator) {
        const regs = await navigator.serviceWorker.getRegistrations();
        log('SW encontrados: ' + regs.length);
        for (const r of regs) {
          await r.unregister();
          log('Desregistrado: ' + (r.scope || '(scope vacío)'));
        }
      } else {
        log('Sin soporte de Service Worker');
      }

      // 2) Borrar TODOS los caches
      if ('caches' in window) {
        const keys = await caches.keys();
        log('Cachés encontrados: ' + keys.length);
        for (const k of keys) {
          await caches.delete(k);
          log('Borrado: ' + k);
        }
      }

      // 3) Limpiar localStorage (mantiene la sesión de Supabase si quieres
      //    re-loguearte, NO la borramos para no obligar a re-loguear).
      log('OK — listo. Toca "Abrir la app".');
      document.getElementById('ir').style.display = 'inline-block';
    } catch (e) {
      log('Error: ' + e.message);
      log('Intenta cerrar y volver a abrir el navegador, o usa el botón abajo.');
      document.getElementById('ir').style.display = 'inline-block';
    }
  })();
  </script>
</body>
</html>
